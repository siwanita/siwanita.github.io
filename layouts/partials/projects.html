{{ $projects := .Site.Data.projects }}
<section class="blue">
  <h2 class="heading">Projects</h2>

  <div class="row" style="white-space: nowrap;">
    {{ range $projects }}
    <div class="col-lg-4 col-md-4 col-12 mb-3">
        <div class="card p-4">
          <a class="mb-3" href="{{ .project_url }}">
            <div class="featuredImage rounded" style="background-size:cover;background-position:center;background-image: url('https://demo.uicard.io/hugo-uilite-portfolio-demo/images/work/work1.jpg'); height: 180px;background-color:#fbfbfb;">   
            </div>
          </a>
          
          <a href="{{ .project_url }}"><h3 class="h4 font-weight-bold text-dark">{{ .title }}</h3></a>
          
          <div> 
            

            <div class="float-right">

            </div>
          </div>
        </div>
    </div>
    {{ end }}
  </div>

  <div class="text-center mt-5">
    <a href="/projects" class="btn btn-lg btn-dark-faded">Browse All</a>
    <a href="https://github.com/siwanita" class="btn btn-lg btn-dark-faded">View on GitHub</a>

  </div>
</section>
